<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina Dictionary | Advanced</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<link rel="icon" href="dic.png" type="image/x-icon">
</head>
<body>

    <div class="container">
        <header>
            <div class="logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path></svg>
                Lumina
            </div>
        </header>

        <div class="search-box">
            <input type="text" id="search-input" placeholder="Search for any word..." spellcheck="false">
            <button id="search-btn">🔍</button>
        </div>

        <!-- Loading Spinner -->
        <div class="loader" id="loader"></div>

        <!-- Error Message -->
        <div class="error-message" id="error-msg">
            <img src="https://cdn-icons-png.flaticon.com/512/753/753341.png" alt="Error">
            <h3>Word Not Found</h3>
            <p>Sorry, we couldn't find the definition for this word.</p>
        </div>

        <!-- Word Result -->
        <div class="word-info" id="word-result">
            <div class="word-header">
                <div class="word-text">
                    <h1 id="word">Hello</h1>
                    <p id="phonetic">/həˈloʊ/</p>
                </div>
                <button class="sound-btn" id="play-sound">
                    🔊
                </button>
            </div>

            <div id="meanings-container">
                <!-- Meanings injected via JS -->
            </div>

            <div class="extra-info" id="extra-info">
                <!-- Synonyms/Antonyms injected via JS -->
            </div>
        </div>

        <!-- History -->
        <div class="history-section">
            <div class="history-title">Recent Searches</div>
            <div class="history-list" id="history-list">
                <!-- History items injected via JS -->
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
